# VectorFlow — reference Alertmanager configuration
#
# PURPOSE
# -------
# This file is a reference template; it is NOT deployed automatically.
# Operators copy it into their Alertmanager configuration and fill in
# receiver secrets (PagerDuty routing keys, webhook URLs) before deploying.
#
# ROUTING LOGIC
# -------------
# Enterprise tier orgs (label: org_tier="enterprise") → PagerDuty
#   SLO critical / high-severity infrastructure alerts for an Enterprise org
#   are escalated immediately via that org's dedicated PagerDuty routing key
#   (stored in AWS Secrets Manager; injected at deploy time).
#
# All other orgs (Free / Pro) → internal dashboard webhook only.
#   Alerts are surfaced in the operator console at /admin/alerts.
#   No outbound page is sent for free-tier incidents.
#
# PII CONSTRAINT
# --------------
# Alert payloads MUST NOT include any customer data beyond organization_id.
# In particular, the following MUST NEVER appear in alert labels,
# annotations, or receiver payloads:
#   - customer email addresses
#   - organization slug / name / domain
#   - user IDs (other than organization_id)
#   - IP addresses or user-agent strings
#   - pipeline names or content
#
# The organization_id label is an opaque UUID. Operators look up org details
# in the operator console (/admin/orgs/<organization_id>) — it is never
# embedded in the outbound alert payload.
#
# REQUIRED LABELS ON PROMETHEUS RULES
# ------------------------------------
# For this routing to work, every per-tenant Prometheus alert rule must
# carry these labels (see vectorflow.rules.yml):
#   organization_id: '{{ $labels.organization_id }}'
#   org_tier:        '{{ $labels.org_tier }}'   # "enterprise" | "pro" | "free"
#
# SLO alerts (vectorflow.slo.rules.yml) fire at the platform level and do
# not carry organization_id; they route to the platform on-call receiver.

global:
  # How long to wait before re-sending an unresolved alert.
  resolve_timeout: 5m

  # PagerDuty API endpoint (default; only override if behind a proxy).
  pagerduty_url: https://events.pagerduty.com/v2/enqueue

# ---------------------------------------------------------------------------
# Templates
# ---------------------------------------------------------------------------
templates:
  - /etc/alertmanager/templates/*.tmpl

# ---------------------------------------------------------------------------
# Routing tree
# ---------------------------------------------------------------------------
route:
  # Default receiver for anything that doesn't match a sub-route.
  receiver: dashboard-only

  # Group alerts sharing the same alertname + organization_id into one
  # notification. This prevents an alert storm from generating one page per
  # affected pipeline when many pipelines share an org.
  group_by: [alertname, organization_id, route]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:

    # ------------------------------------------------------------------
    # 1. SLO platform alerts — no org context, page the platform on-call
    # ------------------------------------------------------------------
    - matchers:
        - slo = "availability_99_9"
        - severity = "critical"
      receiver: pagerduty-platform-oncall
      group_by: [alertname, route, burn_type]
      group_wait: 30s
      repeat_interval: 1h
      # Do not continue to other routes — these are platform-wide.
      continue: false

    - matchers:
        - slo = "availability_99_9"
        - severity = "warning"
      receiver: dashboard-only
      group_by: [alertname, route, burn_type]
      continue: false

    # ------------------------------------------------------------------
    # 2. Enterprise org alerts — escalate to PagerDuty
    #    Requires org_tier="enterprise" label on the originating metric.
    # ------------------------------------------------------------------
    - matchers:
        - org_tier = "enterprise"
        - severity = "critical"
      receiver: pagerduty-enterprise
      group_by: [alertname, organization_id]
      group_wait: 30s
      repeat_interval: 1h
      continue: false

    - matchers:
        - org_tier = "enterprise"
        - severity = "warning"
      receiver: pagerduty-enterprise
      group_by: [alertname, organization_id]
      group_wait: 5m
      repeat_interval: 4h
      continue: false

    # ------------------------------------------------------------------
    # 3. Pro / Free tier — dashboard only
    #    Alerts are visible in the operator console; no outbound page.
    # ------------------------------------------------------------------
    - matchers:
        - org_tier =~ "pro|free"
      receiver: dashboard-only
      group_by: [alertname, organization_id]
      continue: false

    # ------------------------------------------------------------------
    # 4. Infrastructure alerts without org context (node, MetricStore)
    # ------------------------------------------------------------------
    - matchers:
        - severity = "critical"
      receiver: pagerduty-platform-oncall
      continue: false

    # Everything else → dashboard.

# ---------------------------------------------------------------------------
# Inhibition rules
# ---------------------------------------------------------------------------
inhibit_rules:
  # Suppress warnings for an org when a critical is already firing for
  # the same org + alertname. Prevents double-notification.
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: [alertname, organization_id]

# ---------------------------------------------------------------------------
# Receivers
# ---------------------------------------------------------------------------
receivers:

  # ── 1. Platform on-call PagerDuty ────────────────────────────────────────
  # Used for SLO breaches and critical infrastructure alerts (no org context).
  - name: pagerduty-platform-oncall
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_PLATFORM_ROUTING_KEY}
        description: '{{ template "vectorflow.pagerduty.summary" . }}'
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
        # ONLY include opaque identifiers in details — no customer PII.
        details:
          alertname:       '{{ .CommonLabels.alertname }}'
          route:           '{{ .CommonLabels.route }}'
          slo:             '{{ .CommonLabels.slo }}'
          burn_type:       '{{ .CommonLabels.burn_type }}'
          environment:     '{{ .CommonLabels.environment }}'
          runbook:         'https://cloud.vectorflow.sh/admin/runbooks/{{ .CommonLabels.alertname }}'
        # Never send resolved pages for slow-burn warnings (noise).
        send_resolved: true

  # ── 2. Enterprise PagerDuty ───────────────────────────────────────────────
  # Routes to a PagerDuty service configured per Enterprise customer.
  # The routing_key is fetched from AWS Secrets Manager at deploy time;
  # see cloud/docs/operations/slo-and-error-budget.md §Enterprise routing.
  - name: pagerduty-enterprise
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_ENTERPRISE_ROUTING_KEY}
        description: '{{ template "vectorflow.pagerduty.summary" . }}'
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
        # organization_id is an opaque UUID — safe to surface in the PD incident.
        # Do NOT add customer-readable fields here.
        details:
          alertname:       '{{ .CommonLabels.alertname }}'
          organization_id: '{{ .CommonLabels.organization_id }}'
          environment:     '{{ .CommonLabels.environment }}'
          runbook:         'https://cloud.vectorflow.sh/admin/runbooks/{{ .CommonLabels.alertname }}'
        send_resolved: true

  # ── 3. Dashboard-only webhook ─────────────────────────────────────────────
  # Posts to the VectorFlow operator console internal API. No external paging.
  - name: dashboard-only
    webhook_configs:
      - url: http://vectorflow-cloud-internal.vectorflow.svc.cluster.local/api/admin/alerts/ingest
        send_resolved: true
        http_config:
          # Bearer token for the internal alert ingest endpoint.
          bearer_token: ${ALERTMANAGER_INGEST_TOKEN}
        # The webhook payload is the standard Alertmanager JSON body.
        # The ingest endpoint strips all labels except organization_id
        # before persisting — defence-in-depth against PII leakage.
        max_alerts: 50
