name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "agent/**"
      - "prisma/**"
      - "charts/**"
      - "docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions: read-all

env:
  REGISTRY: ghcr.io

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - run: pnpm install --frozen-lockfile

      - name: Dependency audit (high/critical)
        run: pnpm audit --audit-level high --ignore GHSA-r5fr-rjxr-66jc

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify Go module dependencies
        working-directory: agent
        run: go mod verify

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4

      - name: Add Helm chart repositories
        run: helm repo add bitnami https://charts.bitnami.com/bitnami --force-update

      - name: Lint Helm charts
        run: |
          helm lint charts/vectorflow-server \
            --set nextauthUrl=http://localhost:3000 \
            --set secret.nextauthSecret=ci-nextauth-secret-32-characters \
            --set secret.databaseUrl=postgresql://vectorflow:password@postgres:5432/vectorflow
          helm lint charts/vectorflow-agent \
            --set config.serverUrl=http://vectorflow.vectorflow.svc.cluster.local:3000 \
            --set config.token=ci-enrollment-token

      - name: Build dependencies and render Helm charts
        run: |
          helm dependency build charts/vectorflow-server
          helm template vectorflow-server charts/vectorflow-server \
            --set nextauthUrl=http://localhost:3000 \
            --set secret.nextauthSecret=ci-nextauth-secret-32-characters \
            --set secret.databaseUrl=postgresql://vectorflow:password@postgres:5432/vectorflow
          helm dependency build charts/vectorflow-agent
          helm template vectorflow-agent charts/vectorflow-agent \
            --set config.serverUrl=http://vectorflow.vectorflow.svc.cluster.local:3000 \
            --set config.token=ci-enrollment-token

      - name: Validate Docker Compose deployment files
        env:
          NEXTAUTH_URL: http://localhost:3000
        run: |
          docker compose --env-file docker/server/.env.example -f docker/server/docker-compose.yml config
          docker compose --env-file docker/server/.env.example -f docker/server/docker-compose.ha.yml config

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json

  server-image:
    name: Server Image
    needs: check
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/terrifiedbug/vectorflow-server
          tags: |
            type=raw,value=dev,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VF_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  agent-image:
    name: Agent Image
    needs: check
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/terrifiedbug/vectorflow-agent
          tags: |
            type=raw,value=dev,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: agent
          file: agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  agent-dev-binaries:
    name: Agent Dev Binaries
    needs: check
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')) && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: dev-release
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - name: Build dev binaries
        working-directory: agent
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="dev-${SHORT_SHA}"
          LDFLAGS="-s -w -X github.com/TerrifiedBug/vectorflow/agent/internal/agent.Version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../vf-agent-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../vf-agent-linux-arm64 .
          echo "${VERSION}" > ../dev-version.txt

      - name: Generate checksums
        run: sha256sum vf-agent-linux-* > checksums.txt

      - name: Publish dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing dev release if present (gh errors if not found, ignore)
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          # Create fresh pre-release pointing at current commit
          gh release create dev \
            --title "Development Build" \
            --notes "Rolling dev build from \`${GITHUB_SHA::7}\` on main. Not for production use." \
            --target "${GITHUB_SHA}" \
            --prerelease \
            vf-agent-linux-amd64 \
            vf-agent-linux-arm64 \
            checksums.txt \
            dev-version.txt

  agent-binaries:
    name: Agent Binaries
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Helm chart repositories
        run: helm repo add bitnami https://charts.bitnami.com/bitnami --force-update

      - name: Build binaries
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X github.com/TerrifiedBug/vectorflow/agent/internal/agent.Version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../vf-agent-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../vf-agent-linux-arm64 .

      - name: Generate checksums
        run: sha256sum vf-agent-linux-* > checksums.txt

      - name: Package release assets
        run: |
          mkdir -p release-assets
          CHART_VERSION="${GITHUB_REF_NAME#v}"
          helm dependency build charts/vectorflow-server
          helm dependency build charts/vectorflow-agent
          helm package charts/vectorflow-server \
            --destination release-assets \
            --version "${CHART_VERSION}" \
            --app-version "${GITHUB_REF_NAME}"
          helm package charts/vectorflow-agent \
            --destination release-assets \
            --version "${CHART_VERSION}" \
            --app-version "${GITHUB_REF_NAME}"
          tar -czf "release-assets/vectorflow-compose-${GITHUB_REF_NAME}.tar.gz" docker/server docker/agent
          tar -czf "release-assets/vectorflow-dr-${GITHUB_REF_NAME}.tar.gz" scripts/dr-verify.sh docs/e2e-release-gate.md
          sha256sum release-assets/* >> checksums.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-binaries
          path: |
            vf-agent-linux-amd64
            vf-agent-linux-arm64
            checksums.txt
            release-assets

  release:
    name: GitHub Release
    needs: [server-image, agent-image, agent-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent-binaries

      - name: Make binaries executable
        run: chmod +x vf-agent-linux-*

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            vf-agent-linux-amd64
            vf-agent-linux-arm64
            checksums.txt
            release-assets/*
