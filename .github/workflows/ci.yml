name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "agent/**"
      - "prisma/**"
      - "charts/**"
      - "docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_branch_images:
        description: "Publish branch/sha-scoped images for the selected non-main ref"
        required: false
        type: boolean
        default: false

permissions: read-all

concurrency:
  # Cancel in-flight PR runs when a new push lands. Tag pushes (releases)
  # use the workflow + ref as the group so concurrent tag pushes serialise
  # rather than cancel; release jobs MUST complete.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || 'push' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - run: pnpm install --frozen-lockfile

      # Incremental caches: ESLint, tsc, and the generated Prisma
      # client. Keys composite the inputs each cache actually depends
      # on (lockfile for deps, schema.prisma for the generated client,
      # tsconfig for tsc) and the SHA forces every successful run to
      # publish a fresh entry. Restore-keys progressively relax so a
      # cache miss on the exact key still falls back to a recent one
      # — first-load drops from ~60s to ~15s on typical PR commits
      # that touch a handful of files.
      - name: Restore incremental caches (eslint / tsc / prisma client)
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache/eslint
            node_modules/.prisma
            node_modules/@prisma/client
            tsconfig.tsbuildinfo
            .tsbuildinfo
          key: ${{ runner.os }}-ci-incremental-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema.prisma', 'tsconfig.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ci-incremental-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema.prisma', 'tsconfig.json') }}-
            ${{ runner.os }}-ci-incremental-

      - name: Dependency audit (high/critical)
        run: pnpm audit --audit-level high --ignore GHSA-r5fr-rjxr-66jc

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify Go module dependencies
        working-directory: agent
        run: go mod verify

      - name: Test Go agent
        # The agent is half the product; its 100+ tests previously ran only via
        # an honor-system PR-template checkbox. Gate every PR/push on them.
        working-directory: agent
        run: go test -race ./...

      - name: Lint
        # `--cache --cache-location` lets ESLint skip files whose
        # contents + config haven't changed since the cached run.
        # Cache is restored above; on a hit the lint step drops from
        # ~65s to ~15-20s for typical PR-sized diffs.
        run: pnpm exec eslint --cache --cache-location node_modules/.cache/eslint/

      - name: Type check
        # `--incremental` is already set in tsconfig; this step only
        # needs the .tsbuildinfo restored from the cache above. On a
        # hit, tsc skips re-checking unchanged files and the typecheck
        # drops from ~50s to ~10-20s.
        run: npx tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Set up Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4

      - name: Add Helm chart repositories
        run: helm repo add bitnami https://charts.bitnami.com/bitnami --force-update

      - name: Lint Helm charts
        run: |
          helm lint charts/vectorflow-server \
            --set nextauthUrl=http://localhost:3000 \
            --set secret.nextauthSecret=ci-nextauth-secret-32-characters \
            --set secret.databaseUrl=postgresql://vectorflow:password@postgres:5432/vectorflow
          helm lint charts/vectorflow-agent \
            --set config.serverUrl=http://vectorflow.vectorflow.svc.cluster.local:3000 \
            --set config.token=ci-enrollment-token

      - name: Build dependencies and render Helm charts
        run: |
          helm dependency build charts/vectorflow-server
          helm template vectorflow-server charts/vectorflow-server \
            --set nextauthUrl=http://localhost:3000 \
            --set secret.nextauthSecret=ci-nextauth-secret-32-characters \
            --set secret.databaseUrl=postgresql://vectorflow:password@postgres:5432/vectorflow
          helm dependency build charts/vectorflow-agent
          helm template vectorflow-agent charts/vectorflow-agent \
            --set config.serverUrl=http://vectorflow.vectorflow.svc.cluster.local:3000 \
            --set config.token=ci-enrollment-token

      - name: Validate Docker Compose deployment files
        env:
          NEXTAUTH_URL: http://localhost:3000
        run: |
          docker compose --env-file docker/server/.env.example -f docker/server/docker-compose.yml config
          docker compose --env-file docker/server/.env.example -f docker/server/docker-compose.ha.yml config

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json

  server-image:
    name: Server Image
    needs: check
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || inputs.publish_branch_images))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/terrifiedbug/vectorflow-server
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' && inputs.publish_branch_images }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' && inputs.publish_branch_images }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "value=dev" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # QEMU enables building the linux/arm64 image on the amd64 runner.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VF_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fail the release if the published manifest is not a multi-arch index
      # covering both linux/amd64 and linux/arm64.
      - name: Verify multi-arch manifest
        run: |
          platforms=$(docker buildx imagetools inspect \
            ghcr.io/terrifiedbug/vectorflow-server@${{ steps.build.outputs.digest }} \
            --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}')
          echo "platforms: $platforms"
          for want in linux/amd64 linux/arm64; do
            echo "$platforms" | grep -q "$want" || { echo "missing platform: $want"; exit 1; }
          done

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/terrifiedbug/vectorflow-server@${{ steps.build.outputs.digest }}

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/terrifiedbug/vectorflow-server@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: server-image.sbom.cdx.json
          upload-artifact: false

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate server-image.sbom.cdx.json \
            ghcr.io/terrifiedbug/vectorflow-server@${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/terrifiedbug/vectorflow-server
          subject-digest: ${{ steps.build.outputs.digest }}

  agent-image:
    name: Agent Image
    needs: check
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || inputs.publish_branch_images))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/terrifiedbug/vectorflow-agent
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' && inputs.publish_branch_images }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' && inputs.publish_branch_images }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # QEMU enables building the linux/arm64 image on the amd64 runner.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: agent
          file: agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fail the release if the published manifest is not a multi-arch index
      # covering both linux/amd64 and linux/arm64 (the agent runs as a per-node DaemonSet).
      - name: Verify multi-arch manifest
        run: |
          platforms=$(docker buildx imagetools inspect \
            ghcr.io/terrifiedbug/vectorflow-agent@${{ steps.build.outputs.digest }} \
            --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}')
          echo "platforms: $platforms"
          for want in linux/amd64 linux/arm64; do
            echo "$platforms" | grep -q "$want" || { echo "missing platform: $want"; exit 1; }
          done

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/terrifiedbug/vectorflow-agent@${{ steps.build.outputs.digest }}

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/terrifiedbug/vectorflow-agent@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: agent-image.sbom.cdx.json
          upload-artifact: false

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate agent-image.sbom.cdx.json \
            ghcr.io/terrifiedbug/vectorflow-agent@${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/terrifiedbug/vectorflow-agent
          subject-digest: ${{ steps.build.outputs.digest }}


  agent-dev-binaries:
    name: Agent Dev Binaries
    needs: check
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')) && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: dev-release
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - name: Build dev binaries
        working-directory: agent
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="dev-${SHORT_SHA}"
          LDFLAGS="-s -w -X github.com/TerrifiedBug/vectorflow/agent/internal/agent.Version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../vf-agent-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../vf-agent-linux-arm64 .
          echo "${VERSION}" > ../dev-version.txt

      - name: Generate checksums
        run: sha256sum vf-agent-linux-* > checksums.txt

      - name: Publish dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing dev release if present (gh errors if not found, ignore)
          gh release delete dev --yes --cleanup-tag 2>/dev/null || true
          # Create fresh pre-release pointing at current commit
          gh release create dev \
            --title "Development Build" \
            --notes "Rolling dev build from \`${GITHUB_SHA::7}\` on main. Not for production use." \
            --target "${GITHUB_SHA}" \
            --prerelease \
            vf-agent-linux-amd64 \
            vf-agent-linux-arm64 \
            checksums.txt \
            dev-version.txt

  agent-binaries:
    name: Agent Binaries
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Helm chart repositories
        run: helm repo add bitnami https://charts.bitnami.com/bitnami --force-update

      - name: Build binaries
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X github.com/TerrifiedBug/vectorflow/agent/internal/agent.Version=${VERSION}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ../vf-agent-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ../vf-agent-linux-arm64 .

      - name: Generate checksums
        run: sha256sum vf-agent-linux-* > checksums.txt

      - name: Generate source SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false

      - name: Package release assets
        run: |
          mkdir -p release-assets
          CHART_VERSION="${GITHUB_REF_NAME#v}"
          helm dependency build charts/vectorflow-server
          helm dependency build charts/vectorflow-agent
          helm package charts/vectorflow-server \
            --destination release-assets \
            --version "${CHART_VERSION}" \
            --app-version "${GITHUB_REF_NAME}"
          helm package charts/vectorflow-agent \
            --destination release-assets \
            --version "${CHART_VERSION}" \
            --app-version "${GITHUB_REF_NAME}"
          tar -czf "release-assets/vectorflow-compose-${GITHUB_REF_NAME}.tar.gz" docker/server docker/agent
          tar -czf "release-assets/vectorflow-dr-${GITHUB_REF_NAME}.tar.gz" scripts/dr-verify.sh docs/e2e-release-gate.md
          # Attach the CycloneDX SBOM to the release.
          cp sbom.cdx.json "release-assets/vectorflow-sbom-${GITHUB_REF_NAME}.cdx.json"
          sha256sum release-assets/* >> checksums.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-binaries
          path: |
            vf-agent-linux-amd64
            vf-agent-linux-arm64
            checksums.txt
            release-assets

  release:
    name: GitHub Release
    needs: [server-image, agent-image, agent-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent-binaries

      - name: Make binaries executable
        run: chmod +x vf-agent-linux-*

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            vf-agent-linux-amd64
            vf-agent-linux-arm64
            checksums.txt
            release-assets/*
