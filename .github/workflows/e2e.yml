name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "agent/**"
      - "prisma/**"
      - "e2e/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - ".github/workflows/e2e.yml"
  push:
    tags: ["v*"]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || 'push' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vectorflow_e2e
          POSTGRES_PASSWORD: e2e_test_password
          POSTGRES_DB: vectorflow_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vectorflow_e2e:e2e_test_password@localhost:5432/vectorflow_e2e
      NEXTAUTH_SECRET: e2e-test-secret-key-at-least-32-chars
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: e2e-test-encryption-key-32chars!!
      # `next build` runs in production mode and the WebAuthn provider hard-fails
      # at module load if VF_WEBAUTHN_RP_ID is unset. The e2e server runs on
      # localhost, so localhost is the correct RP id (origins derive to :3000).
      VF_WEBAUTHN_RP_ID: localhost

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build application
        run: pnpm build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server
        run: pnpm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
