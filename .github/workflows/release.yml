name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: agent/go.mod

      - name: Build agent binaries
        working-directory: agent
        env:
          VERSION: ${{ github.ref_name }}
        run: make build-all

      - name: Generate checksums
        working-directory: agent/bin
        run: sha256sum vf-agent-* > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | sed -n '2p')
          ARGS=(--title "${GITHUB_REF_NAME}" --generate-notes --latest)
          if [ -n "$PREV_TAG" ]; then
            ARGS+=(--notes-start-tag "$PREV_TAG")
          fi
          gh release create "${GITHUB_REF_NAME}" "${ARGS[@]}" \
            agent/bin/vf-agent-linux-amd64 \
            agent/bin/vf-agent-linux-arm64 \
            agent/bin/checksums.txt
