name: Smoke E2E

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "e2e/**"
      - "prisma/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - ".github/workflows/smoke-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vectorflow_e2e
          POSTGRES_PASSWORD: e2e_test_password
          POSTGRES_DB: vectorflow_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vectorflow_e2e:e2e_test_password@localhost:5432/vectorflow_e2e
      NEXTAUTH_SECRET: e2e-test-secret-key-at-least-32-chars
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: e2e-test-encryption-key-32chars!!

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build application
        run: pnpm build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start server
        run: pnpm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run smoke E2E tests
        run: pnpm test:e2e:smoke

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-e2e-playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
