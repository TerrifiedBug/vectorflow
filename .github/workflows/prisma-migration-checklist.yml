name: Prisma Migration Checklist

on:
  pull_request:
    # `edited` fires on title/description tweaks — wasteful. `ready_for_review`
    # is redundant with `synchronize` for draft transitions. Keep only the
    # event types that actually change diff contents.
    types: [opened, synchronize, reopened]
    paths:
      - "prisma/schema.prisma"
      - "prisma/migrations/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/scripts/check-prisma-migration-checklist.mjs"
      - ".github/workflows/prisma-migration-checklist.yml"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checklist:
    name: Require migration checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MERGE_BASE="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"
          git diff --name-only "$MERGE_BASE" "$HEAD_SHA" > "$RUNNER_TEMP/changed-files.txt"
          cat "$RUNNER_TEMP/changed-files.txt"

      - name: Validate Prisma migration checklist
        env:
          CHANGED_FILES_PATH: ${{ runner.temp }}/changed-files.txt
        run: node .github/scripts/check-prisma-migration-checklist.mjs
