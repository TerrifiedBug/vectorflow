name: Label PRs

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-label:
    name: Conventional Commit Labels
    runs-on: ubuntu-latest
    steps:
      - uses: bcoe/conventional-release-labels@v1
        with:
          type_labels: |
            {
              "feat": "feature",
              "fix": "fix",
              "bug": "fix",
              "refactor": "refactor",
              "perf": "performance",
              "docs": "documentation",
              "ci": "ci",
              "chore": "improvement",
              "security": "security"
            }

  path-label:
    name: Path-Based Labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/labeler@v6
        with:
          sync-labels: false
