name: CodeQL

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "agent/**"
      - "prisma/**"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "agent/**"
      - "prisma/**"
      - "package.json"
      - "pnpm-lock.yaml"
  schedule:
    - cron: "30 5 * * 1" # Monday 5:30 UTC

permissions: read-all

jobs:
  analyze-javascript:
    name: Analyze TypeScript/JavaScript
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - uses: github/codeql-action/autobuild@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3

      - uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          category: "/language:javascript-typescript"

  analyze-go:
    name: Analyze Go
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          languages: go
          queries: security-extended

      - name: Build agent
        working-directory: agent
        run: go build ./...

      - uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          category: "/language:go"
