events {
    worker_connections 1024;
}

http {
    upstream vectorflow {
        server vf1:3000 max_fails=1 fail_timeout=10s;
        server vf2:3000 max_fails=1 fail_timeout=10s;
        keepalive 16;
    }

    server {
        listen 3000;

        location / {
            proxy_pass http://vectorflow;
            proxy_http_version 1.1;
            proxy_connect_timeout 2s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Use keepalive connections to upstream (SSE is not WebSocket — no Upgrade header)
            proxy_set_header Connection "";

            # SSE support: disable buffering so events stream immediately
            proxy_buffering off;
            proxy_cache off;

            # Keep SSE connections alive for up to 24 hours
            proxy_read_timeout 86400s;
        }
    }
}
