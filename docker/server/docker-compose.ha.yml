# High-Availability VectorFlow stack
# Two VectorFlow instances behind nginx, with Redis for cross-instance coordination.
#
# Quick start:
#   cp .env.example .env   # fill in secrets
#   docker compose -f docker/server/docker-compose.ha.yml up -d
#
# Required env vars:
#   POSTGRES_PASSWORD   — PostgreSQL password
#   NEXTAUTH_SECRET     — NextAuth session signing secret
# Optional but strongly recommended:
#   NEXTAUTH_URL        — Externally reachable URL of this deployment
#                          (used by alert/dashboard links, OAuth callbacks).
#                          If unset, auth trusts the incoming host header instead.
#
# Optional:
#   VF_VERSION          — VectorFlow image tag (default: latest)

services:
  postgres:
    container_name: vectorflow-ha-postgres
    # PostgreSQL-compatible TimescaleDB image used for metrics hypertables.
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: vectorflow
      POSTGRES_USER: vectorflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: vectorflow-ha-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot migration runner. With two app replicas, letting each container run
  # `prisma migrate deploy` on boot races on the _prisma_migrations advisory lock
  # and can leave a migration half applied. This service applies migrations once,
  # then exits; vf1/vf2 wait for it to complete and skip migrating themselves
  # (VF_SKIP_MIGRATIONS=true).
  migrate:
    container_name: vectorflow-ha-migrate
    image: ghcr.io/terrifiedbug/vectorflow-server:${VF_VERSION:-latest}
    command: ["./migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Same DATABASE_URL resolution as the app containers.
      DATABASE_URL:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: "no"

  vf1:
    container_name: vectorflow-ha-1
    image: ghcr.io/terrifiedbug/vectorflow-server:${VF_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # Entrypoint constructs DATABASE_URL from POSTGRES_PASSWORD with proper
      # URL-encoding. Set DATABASE_URL directly in .env to point at an
      # external Postgres instead.
      DATABASE_URL:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Encryption-at-rest master key (see .env.example). Required in production
      # unless VF_ALLOW_NEXTAUTH_DERIVED_KEY=true. Without forwarding it here the
      # container can't see the value even when it is set in .env.
      VF_ENCRYPTION_KEY_V2: ${VF_ENCRYPTION_KEY_V2:-}
      VF_ALLOW_NEXTAUTH_DERIVED_KEY: ${VF_ALLOW_NEXTAUTH_DERIVED_KEY:-}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL:
      # Migrations are handled once by the `migrate` service above.
      VF_SKIP_MIGRATIONS: "true"
    volumes:
      - vfdata1:/app/.vectorflow
      - backups:/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  vf2:
    container_name: vectorflow-ha-2
    image: ghcr.io/terrifiedbug/vectorflow-server:${VF_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      VF_ENCRYPTION_KEY_V2: ${VF_ENCRYPTION_KEY_V2:-}
      VF_ALLOW_NEXTAUTH_DERIVED_KEY: ${VF_ALLOW_NEXTAUTH_DERIVED_KEY:-}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL:
      # Migrations are handled once by the `migrate` service above.
      VF_SKIP_MIGRATIONS: "true"
    volumes:
      - vfdata2:/app/.vectorflow
      - backups:/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  nginx:
    container_name: vectorflow-ha-nginx
    image: nginx:alpine
    # Compose cannot express "start after either replica is healthy", so nginx
    # waits for at least one ready app before it accepts traffic.
    depends_on:
      vf1:
        condition: service_started
      vf2:
        condition: service_started
    command:
      - /bin/sh
      - -ec
      - |
        until wget -q -T 2 -t 1 -O /dev/null http://vf1:3000/api/health/ready \
          || wget -q -T 2 -t 1 -O /dev/null http://vf2:3000/api/health/ready; do
          echo "Waiting for at least one VectorFlow replica to become ready..."
          sleep 2
        done
        exec nginx -g 'daemon off;'
    ports:
      - "3000:3000"
    volumes:
      - ./nginx-ha.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
    name: vectorflow-ha-pgdata
  redisdata:
    name: vectorflow-ha-redisdata
  vfdata1:
    name: vectorflow-ha-data1
  vfdata2:
    name: vectorflow-ha-data2
  backups:
    name: vectorflow-ha-backups
