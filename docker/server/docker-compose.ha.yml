# High-Availability VectorFlow stack
# Two VectorFlow instances behind nginx, with Redis for cross-instance coordination.
#
# Quick start:
#   cp .env.example .env   # fill in secrets
#   docker compose -f docker/server/docker-compose.ha.yml up -d
#
# Required env vars (Compose will refuse to start if any are missing):
#   POSTGRES_PASSWORD   — PostgreSQL password
#   NEXTAUTH_SECRET     — NextAuth session signing secret
#   NEXTAUTH_URL        — Externally reachable URL of this deployment
#                          (used by alert/dashboard links, OAuth callbacks).
#                          No localhost fallback — set it explicitly.
#
# Optional:
#   VF_VERSION          — VectorFlow image tag (default: latest)

services:
  postgres:
    container_name: vectorflow-ha-postgres
    # PostgreSQL-compatible TimescaleDB image used for metrics hypertables.
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: vectorflow
      POSTGRES_USER: vectorflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: vectorflow-ha-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vf1:
    container_name: vectorflow-ha-1
    image: ghcr.io/terrifiedbug/vectorflow-server:${VF_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vectorflow:${POSTGRES_PASSWORD}@postgres:5432/vectorflow
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL must be set to the externally reachable URL of this deployment}
      AUTH_TRUST_HOST: "true"
    volumes:
      - vfdata1:/app/.vectorflow
      - backups:/backups
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  vf2:
    container_name: vectorflow-ha-2
    image: ghcr.io/terrifiedbug/vectorflow-server:${VF_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vectorflow:${POSTGRES_PASSWORD}@postgres:5432/vectorflow
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL must be set to the externally reachable URL of this deployment}
      AUTH_TRUST_HOST: "true"
    volumes:
      - vfdata2:/app/.vectorflow
      - backups:/backups
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  nginx:
    container_name: vectorflow-ha-nginx
    image: nginx:alpine
    # Compose cannot express "start after either replica is healthy", so nginx
    # waits for at least one ready app before it accepts traffic.
    depends_on:
      vf1:
        condition: service_started
      vf2:
        condition: service_started
    command:
      - /bin/sh
      - -ec
      - |
        until wget -q -T 2 -O /dev/null http://vf1:3000/api/health/ready \
          || wget -q -T 2 -O /dev/null http://vf2:3000/api/health/ready; do
          echo "Waiting for at least one VectorFlow replica to become ready..."
          sleep 2
        done
        exec nginx -g 'daemon off;'
    ports:
      - "3000:3000"
    volumes:
      - ./nginx-ha.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
    name: vectorflow-ha-pgdata
  redisdata:
    name: vectorflow-ha-redisdata
  vfdata1:
    name: vectorflow-ha-data1
  vfdata2:
    name: vectorflow-ha-data2
  backups:
    name: vectorflow-ha-backups
