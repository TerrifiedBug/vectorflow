services:
  postgres:
    container_name: vectorflow-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vectorflow
      POSTGRES_USER: vectorflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
#    ports:
#      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vectorflow:
    container_name: vectorflow-server
    image: ghcr.io/terrifiedbug/vectorflow-server:${VF_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vectorflow:${POSTGRES_PASSWORD}@postgres:5432/vectorflow
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    volumes:
      - vfdata:/app/.vectorflow
      - backups:/backups
    restart: unless-stopped

volumes:
  pgdata:
    name: vectorflow-pgdata
  vfdata:
    name: vectorflow-data
  backups:
    name: vectorflow-backups