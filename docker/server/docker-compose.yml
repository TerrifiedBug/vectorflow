# VectorFlow — core stack
# PostgreSQL + VectorFlow server + vf-agent on a single host.
#
# Quick start (two phases — the agent needs a token that only exists after first login):
#
#   1. Start Postgres + server:
#        cp .env.example .env   # set POSTGRES_PASSWORD and NEXTAUTH_SECRET
#        docker compose up -d
#      The server runs database migrations automatically on first boot.
#
#   2. Enroll the agent: open the UI, finish setup, then generate a token in
#      Environments → (your environment) → Agent Enrollment → Generate token. Put it in .env as
#      VF_ENROLLMENT_TOKEN and start the agent (it lives behind the "agent" profile
#      so step 1 does not require the token):
#        docker compose --profile agent up -d
#
# Required env vars:
#   POSTGRES_PASSWORD   — PostgreSQL password
#   NEXTAUTH_SECRET     — NextAuth session signing secret
#   VF_ENROLLMENT_TOKEN — Agent enrollment token (phase 2 only; from VectorFlow UI)
#
# Optional:
#   VF_VERSION   — Image tag (default: latest)
#   NEXTAUTH_URL — Externally reachable URL (for OAuth callbacks, alert links)

services:
  postgres:
    container_name: vectorflow-postgres
    # PostgreSQL-compatible TimescaleDB image used for metrics hypertables.
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: vectorflow
      POSTGRES_USER: vectorflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
#    ports:
#      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vectorflow:
    container_name: vectorflow-server
    image: ghcr.io/terrifiedbug/vectorflow-server:${VF_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Entrypoint constructs DATABASE_URL from POSTGRES_PASSWORD with proper
      # URL-encoding. Set DATABASE_URL directly in .env to point at an
      # external Postgres instead.
      DATABASE_URL:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL:
    volumes:
      - vfdata:/app/.vectorflow
      - backups:/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    mem_limit: 1g
    cpus: 2.0
    restart: unless-stopped

  vf-agent:
    container_name: vectorflow-agent
    image: ghcr.io/terrifiedbug/vectorflow-agent:${VF_VERSION:-latest}
    # Behind a profile so the default `docker compose up -d` starts only
    # Postgres + server. The agent needs an enrollment token that can only be
    # generated after first login; start it in phase 2 with `--profile agent`.
    profiles: ["agent"]
    depends_on:
      vectorflow:
        condition: service_healthy
    environment:
      VF_URL: http://vectorflow:3000
      # Empty default (not `:?`) so `docker compose up -d` never aborts before
      # the token exists. The agent requires VF_TOKEN only for first enrollment;
      # afterwards the node token is persisted in the agent-data volume and this
      # can be left unset. If unset AND not yet enrolled, the agent exits with a
      # clear "VF_TOKEN is not set — cannot enroll" error.
      VF_TOKEN: ${VF_ENROLLMENT_TOKEN:-}
    volumes:
      - agent-data:/var/lib/vf-agent
      - vector-data:/var/lib/vector
    restart: unless-stopped

volumes:
  pgdata:
    name: vectorflow-pgdata
  vfdata:
    name: vectorflow-data
  backups:
    name: vectorflow-backups
  agent-data:
    name: vectorflow-agent-data
  vector-data:
    name: vectorflow-vector-data
