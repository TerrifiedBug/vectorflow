# Production docker-compose for VectorFlow agent.
# Uses pre-built images from GitHub Container Registry.
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose -f docker-compose.prod.yml up -d

services:
  vf-agent:
    container_name: vectorflow-agent
    image: ghcr.io/terrifiedbug/vectorflow-agent:${VF_VERSION:-latest}
    env_file:
      - .env
    volumes:
      - agent-data:/var/lib/vf-agent
    network_mode: host
    restart: unless-stopped

volumes:
  agent-data:
    name: vectorflow-agent-data
