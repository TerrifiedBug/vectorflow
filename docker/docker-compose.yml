services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vectorflow
      POSTGRES_USER: vectorflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vectorflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  vectorflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vectorflow:${POSTGRES_PASSWORD:-vectorflow}@postgres:5432/vectorflow
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
    env_file:
      - path: .env
        required: false

  # Optional: add a Vector instance for local testing.
  # Uncomment to run Vector alongside VectorFlow.
  # vector:
  #   image: timberio/vector:0.43.1-alpine
  #   command: ["vector", "--config-dir", "/etc/vector/configs", "--watch-config"]
  #   ports:
  #     - "8686:8686"
  #   volumes:
  #     - vector-configs:/etc/vector/configs:ro
  #   environment:
  #     VECTOR_API_ENABLED: "true"
  #     VECTOR_API_ADDRESS: "0.0.0.0:8686"

volumes:
  pgdata:
