{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vectorflow-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vectorflow-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secret.nextauthSecret }}
  NEXTAUTH_SECRET: {{ .Values.secret.nextauthSecret | quote }}
  {{- else }}
  {{- fail "secret.nextauthSecret is required when existingSecret is not set. Generate one with: openssl rand -base64 32" }}
  {{- end }}
  {{- if .Values.secret.databaseUrl }}
  DATABASE_URL: {{ .Values.secret.databaseUrl | quote }}
  {{- else if not .Values.postgresql.enabled }}
  {{- fail "secret.databaseUrl is required when existingSecret is not set and postgresql.enabled is false" }}
  {{- end }}
  {{- if .Values.secret.redisUrl }}
  REDIS_URL: {{ .Values.secret.redisUrl | quote }}
  {{- end }}
  {{- if .Values.secret.encryptionKeyV2 }}
  VF_ENCRYPTION_KEY_V2: {{ .Values.secret.encryptionKeyV2 | quote }}
  {{- end }}
{{- end }}
