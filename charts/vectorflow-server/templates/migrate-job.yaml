{{- if .Values.migrations.enabled }}
{{- if not .Values.existingSecret }}
{{- fail "migrations.enabled runs migrations from a pre-install/pre-upgrade hook Job, which executes BEFORE the chart's own Secret and bundled PostgreSQL exist. It therefore requires an externally-managed database exposed via existingSecret (with a DATABASE_URL key). For bundled PostgreSQL (postgresql.enabled) or a chart-created secret (secret.databaseUrl), set migrations.enabled=false; the server pods then apply migrations on startup, serialized by Prisma's advisory lock." }}
{{- end }}
{{/*
Gate `prisma migrate deploy` to a single execution per release.

Every server replica runs the same entrypoint, so in an HA deployment they would
all run migrations concurrently and contend on the _prisma_migrations advisory
lock. This pre-install/pre-upgrade hook Job applies migrations exactly once before
the new pods roll out; the Deployment sets VF_SKIP_MIGRATIONS=true so the server
pods never migrate themselves.

A pre-install hook runs before the chart's normal-phase resources, so this Job must
not depend on them: it uses the namespace default ServiceAccount (it needs no
Kubernetes API access — automountServiceAccountToken is disabled) and sources
DATABASE_URL from existingSecret, which the guard above requires.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vectorflow-server.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vectorflow-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  {{- if .Values.migrations.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "vectorflow-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["./migrate.sh"]
          env:
            {{- include "vectorflow-server.databaseUrlEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
