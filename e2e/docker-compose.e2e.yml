services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vectorflow_e2e
      POSTGRES_PASSWORD: e2e_test_password
      POSTGRES_DB: vectorflow_e2e
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorflow_e2e"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
